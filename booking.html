<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visit & Booking</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f2f2f2;
        }

        /* Header */
        header {
            background: #6a0dad;
            color: white;
            text-align: center;
            padding: 25px;
        }

        header h1 {
            margin: 0;
        }

        /* Container */
        .container {
            width: 90%;
            max-width: 700px;
            margin: 30px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 12px rgba(0, 0, 0, 0.1);
        }

        /* Inputs */
        input,
        select,
        textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 15px;
        }

        /* Button */
        button {
            background: #ff4da6;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #e60073;
        }

        /* Footer */
        footer {
            background: #222;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 30px;
        }
    </style>
</head>

<body>

    <header>
        <h1>Visit & Booking Page</h1>
        <p>Book your visit easily online</p>
    </header>

    <div class="container">

        <h2>Book Your Visit</h2>

        <form onsubmit="showMessage(event)">

            <label>Name</label>
            <input type="text" required>

            <label>Email</label>
            <input type="email" required>

            <label>Phone Number</label>
            <input type="tel" required>

            <label>Visit Date</label>
            <input type="date" required>

            <label>Select Service</label>
            <select>
                <option>General Visit</option>
                <option>Photography Session</option>
                <option>Consultation</option>
            </select>

            <label>Message</label>
            <textarea placeholder="Any special request"></textarea>

            <button type="submit">Book Now</button>

        </form>

        <p id="success" style="color:green;display:none;">
            ✅ Booking Submitted Successfully!
        </p>

    </div>

    <footer>
        <p>© 2026 Visit Booking | All Rights Reserved</p>
    </footer>

    <script>
        function showMessage(event) {
            event.preventDefault();
            document.getElementById("success").style.display = "block";
        }
    </script>

</body>

</html>
