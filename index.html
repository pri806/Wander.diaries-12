<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="Utf-8">
    <meta name="viewport" content="width=device-width
    initial-scale=1.0">

    <title>wander.diaries-12 </title>
    <!--Fonts-->
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=UnifrakturCook:wght@700&display=swap">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #6a0dad, #ff4da6);
            color: white;
        }

        /* Navbar */
        nav {
            padding: 15px;
            font-size: 18px;
        }

        /* Hero Section */
        .hero {
            margin-top: 80px;
        }

        .hero h1 {
            font-size: 40px;
        }

        .hero p {
            font-size: 18px;
            margin: 15px 0;
        }

        /* Button */
        .btn {
            background: white;
            color: #6a0dad;
            padding: 15px 30px;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #ffe6f5;
        }

        /* Booking Form */
        .form-box {
            display: none;
            background: white;
            color: black;
            width: 90%;
            max-width: 400px;
            margin: 40px auto;
            padding: 20px;
            border-radius: 10px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }

        footer {
            margin-top: 60px;
            padding: 15px;
        }
    </style>
</head>

<body>

    <nav>
        ⭐ Visit & Booking
    </nav>

    <div class="hero">
        <h1>Welcome</h1>
        <p>Book your visit easily in one click</p>

        <button class="btn" onclick="openForm()">Book Now</button>
    </div>

    <!-- Instagram Button -->
    <div style="text-align:center; margin-top:20px;">
        <a href="https://www.instagram.com/wander.diaries_12?igsh=MTR2b3FsdXN2bTRuYg==" target="_blank">
            <button style="
background:#E1306C;
color:white;
border:none;
padding:12px 20px;
font-size:16px;
border-radius:25px;
cursor:pointer;">
                📸 Follow us on Instagram
            </button>
        </a>
    </div>

    <!-- Booking Form -->
    <div class="form-box" id="bookingForm">
        <h2>Booking Form</h2>

        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Email" required>
        <input type="date" required>
        <input type="tel" placeholder="Phone Number" required>

        <button class="btn" onclick="success()">Submit</button>

        <p id="msg" style="color:green;display:none;">
            ✅ Booking Submitted!
        </p>
    </div>

    <footer>
        © 2026 Booking Page
    </footer>

    <script>
        function openForm() {
            document.getElementById("bookingForm").style.display = "block";
        }

        function success() {
            document.getElementById("msg").style.display = "block";
        }
    </script>

</body>

</html>
